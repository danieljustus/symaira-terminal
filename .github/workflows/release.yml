name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "${CERTIFICATE_P12:-}" ]; then
            echo "::error::CERTIFICATE_P12 secret is not set. Cannot sign the app."
            exit 1
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          echo -n "$CERTIFICATE_P12" | base64 --decode -o "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build and archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          xcodebuild archive \
            -project SymairaTerminal.xcodeproj \
            -scheme SymairaTerminal \
            -archivePath build/release/SymairaTerminal.xcarchive \
            -configuration Release

      - name: Export archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat > build/release/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Developer ID Application</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/release/SymairaTerminal.xcarchive \
            -exportOptionsPlist build/release/ExportOptions.plist \
            -exportPath build/release/export

      - name: Notarize and staple
        env:
          NOTARY_API_KEY: ${{ secrets.NOTARY_API_KEY }}
          NOTARY_API_ISSUER: ${{ secrets.NOTARY_API_ISSUER }}
          NOTARY_API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
        run: |
          APP_PATH=$(find build/release/export -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app found after export. Export may have failed."
            exit 1
          fi
          if [ -z "${NOTARY_API_KEY:-}" ]; then
            echo "::error::NOTARY_API_KEY secret is not set. Cannot notarize."
            exit 1
          fi
          KEY_PATH="$RUNNER_TEMP/notary-api.json"
          cat > "$KEY_PATH" << EOF
          {
            "key": "${NOTARY_API_KEY}",
            "keyID": "${NOTARY_API_KEY_ID}",
            "issuer": "${NOTARY_API_ISSUER}"
          }
          EOF
          xcrun notarytool submit "$APP_PATH" \
            --key "$KEY_PATH" \
            --wait
          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_PATH=$(find build/release/export -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app found for DMG creation."
            exit 1
          fi
          hdiutil create -volname "SymairaTerminal" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "build/release/SymairaTerminal-${VERSION}.dmg"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" \
            "build/release/SymairaTerminal-${VERSION}.dmg#SymairaTerminal-${VERSION}.dmg" \
            --title "v${VERSION}" \
            --generate-notes

      - name: Update Homebrew tap
        env:
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_PATH="build/release/SymairaTerminal-${VERSION}.dmg"
          if [ -f "$DMG_PATH" ] && [ -n "${TAP_REPO_TOKEN:-}" ]; then
            ./scripts/update-homebrew-tap.sh "$VERSION" "$DMG_PATH"
          else
            echo "Skipping tap update: DMG not found or TAP_REPO_TOKEN not set"
          fi
