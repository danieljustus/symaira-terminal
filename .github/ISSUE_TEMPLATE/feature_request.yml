name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["feature", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please fill out the information below to help us understand and evaluate your request.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like to see.
      placeholder: Tell us what you want to happen...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
      placeholder: "I've tried..."
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      description: Which part of the app does this relate to?
      options:
        - Terminal rendering
        - Agent status/rings
        - Multi-pane layout
        - Session persistence
        - BYOK/Provider settings
        - Worktree management
        - Context bank
        - Settings UI
        - CLI integration
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Nice to have
        - Important
        - Critical (blocking my workflow)
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Describe a specific use case or scenario where this feature would be helpful.
      placeholder: "When I'm doing X, I need to Y..."
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or mockups for the feature request.
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched the [existing issues](https://github.com/danieljustus/symaira-terminal/issues) to make sure this feature has not already been requested.
          required: true
